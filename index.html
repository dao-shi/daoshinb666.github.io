<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导师 | 个人主页</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 音乐按钮 */
        .music-btn{
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,192,203,0.35);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #ffc0cb;
            font-size: 22px;
            cursor: pointer;
            z-index: 999;
            transition: 0.3s;
        }
        .music-btn:hover{
            background: rgba(255,192,203,0.5);
        }

        /* 封面容器 缩小50% */
        .disk-cover-wrap {
            position: fixed;
            bottom: 85px;
            right: 22px;
            z-index: 998;
            transition: all 0.4s ease;
        }
        .disk-cover-wrap.hide-cover {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.6);
        }
        .disk-cover {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255,192,203,0.4);
            box-shadow: 0 0 12px rgba(255,182,193,0.3);
            object-fit: cover;
            transition: all 0.3s ease;
        }
        /* 最小化按钮 */
        .min-cover-btn {
            position: absolute;
            top: -12px;
            right: -8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,192,203,0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            font-size: 14px;
            text-align: center;
            line-height: 24px;
            cursor: pointer;
        }

        /* 进度、音量、时间容器 */
        .control-box{
            position: fixed;
            bottom: 145px;
            right: 18px;
            width: 75px;
            z-index: 997;
        }
        .time-text{
            color: #ffd6e0;
            font-size: 10px;
            text-align: center;
            margin: 4px 0;
            letter-spacing: 1px;
        }
        .music-progress,.vol-progress{
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.2);
            outline: none;
            -webkit-appearance: none;
            margin: 3px 0;
        }
        .music-progress::-webkit-slider-thumb,
        .vol-progress::-webkit-slider-thumb{
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffc0cb;
            cursor: pointer;
        }
        .vol-tip{
            font-size: 9px;
            color:#ffd6e0;
            text-align:center;
        }

        /* 旋转动画 */
        @keyframes rotateDisk {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .running {
            animation: rotateDisk 12s linear infinite;
        }
        .stop {
            animation-play-state: paused;
        }
    </style>
</head>
<body>
    <div class="sakura-bg"></div>

    <!-- 旋转封面+最小化 -->
    <div class="disk-cover-wrap" id="coverWrap">
        <span class="min-cover-btn" id="minCoverBtn">－</span>
        <img class="disk-cover stop" id="coverImg" src="">
    </div>

    <!-- 进度条 + 时间 + 音量 -->
    <div class="control-box">
        <input type="range" class="music-progress" id="progressBar" value="0" min="0" max="100">
        <div class="time-text" id="timeShow">00:00 / 00:00</div>
        <div class="vol-tip">音量</div>
        <input type="range" class="vol-progress" id="volBar" value="80" min="0" max="100">
    </div>

    <audio id="bgm" preload="auto">
    <button class="music-btn" id="musicBtn">♪</button>

    <div class="container">
        <header class="hero">
            <h1 class="title">导师</h1>
            <p class="subtitle">小众 · 折腾 · 技术 · 自由</p>
            <div class="tags">
                <span>#Python</span>
                <span>#安卓改造</span>
                <span>#游戏研究</span>
                <span>#逆向开发</span>
            </div>
        </header>

        <section class="about">
            <h2>关于本站</h2>
            <p>
                欢迎来到 导师 の 个人站点。
                我是一名热爱技术的高中生，偏爱折腾各类设备与程序。
                不随波逐流，只专注自己的热爱，用技术创造便利与乐趣。
            </p>
        </section>

        <section class="skills">
            <h2>能力范围</h2>
            <div class="skill-list">
                <div class="skill-item">
                    <h3>Python 开发</h3>
                    <p>自动化脚本、数据处理、批量工具开发</p>
                </div>
                <div class="skill-item">
                    <h3>安卓深度定制</h3>
                    <p>Root、内核、模块、框架美化与功能改造</p>
                </div>
                <div class="skill-item">
                    <h3>游戏机制解析</h3>
                    <p>内存调试、数据分析、玩法深度研究</p>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p>© 2026 导师 | 专属域名 daoshinb666.com</p>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        // 歌单 + 对应封面
        const musicList = [
            {src:"https://music.163.com/song/media/outer/url?id=1906795321.mp3",cover:"https://picsum.photos/id/1041/300/300"},
            {src:"https://music.163.com/song/media/outer/url?id=29755535.mp3",cover:"https://picsum.photos/id/1039/300/300"},
            {src:"https://music.163.com/song/media/outer/url?id=1448054126.mp3",cover:"https://picsum.photos/id/1042/300/300"},
            {src:"https://music.163.com/song/media/outer/url?id=347303.mp3",cover:"https://picsum.photos/id/1036/300/300"},
            {src:"https://music.163.com/song/media/outer/url?id=346716.mp3",cover:"https://picsum.photos/id/1038/300/300"}
        ];

        const bgm = document.getElementById('bgm');
        const btn = document.getElementById('musicBtn');
        const coverImg = document.getElementById('coverImg');
        const coverWrap = document.getElementById('coverWrap');
        const minCoverBtn = document.getElementById('minCoverBtn');
        const progressBar = document.getElementById('progressBar');
        const timeShow = document.getElementById('timeShow');
        const volBar = document.getElementById('volBar');

        let isPlay = false;
        let nowIndex = 0;
        let hideCover = false;

        // 秒数格式化
        function formatTime(s){
            if(isNaN(s)) return "00:00";
            let m = Math.floor(s / 60);
            let ss = Math.floor(s % 60);
            return (m<10?"0"+m:m) + ":" + (ss<10?"0"+ss:ss);
        }

        // 切歌换封面
        function nextMusic(){
            nowIndex = (nowIndex + 1) % musicList.length;
            bgm.src = musicList[nowIndex].src;
            coverImg.src = musicList[nowIndex].cover;
        }

        // 初始化
        bgm.src = musicList[0].src;
        coverImg.src = musicList[0].cover;
        bgm.volume = 0.8;

        // 最小化封面
        minCoverBtn.onclick = function(){
            hideCover = !hideCover;
            coverWrap.classList.toggle("hide-cover", hideCover);
            this.innerText = hideCover ? "＋" : "－";
        };

        // 解锁自动播放
        document.addEventListener('click', ()=>{
            if(!isPlay){
                bgm.play();
                isPlay = true;
                btn.innerText = "⏸";
                coverImg.classList.add("running");
            }
        },{once:true});

        // 播放暂停
        btn.onclick = function(){
            if(bgm.paused){
                bgm.play();
                this.innerText = "⏸";
                coverImg.classList.add("running");
                coverImg.classList.remove("stop");
            }else{
                bgm.pause();
                this.innerText = "♪";
                coverImg.classList.add("stop");
            }
        };

        // 进度+时间更新
        bgm.ontimeupdate = function(){
            let cur = bgm.currentTime;
            let dur = bgm.duration;
            let percent = (cur / dur) * 100;
            if(!isNaN(percent)) progressBar.value = percent;
            timeShow.innerText = formatTime(cur) + " / " + formatTime(dur);
        };

        // 拖拽进度
        progressBar.oninput = function(){
            let t = (this.value / 100) * bgm.duration;
            bgm.currentTime = t;
        };

        // 音量调节
        volBar.oninput = function(){
            bgm.volume = this.value / 100;
        };

        // 自动下一首
        bgm.onended = function(){
            nextMusic();
            bgm.play();
        };
    </script>
</body>
</html>
