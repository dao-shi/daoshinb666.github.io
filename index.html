<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>导师 | 个人主页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            /* 上天空蓝 下深海蓝 垂直渐变过渡 */
            background: linear-gradient(to bottom, #87b8e8, #4068a0, #102040, #081020);
            color:#f1f5f9;
            min-height:100vh;
            font-family:"Microsoft Yahei",sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* 纯CSS静态星星 轻量化不卡 */
        body::before{
            content:"";
            position:fixed;
            top:0;left:0;
            width:100%;height:100%;
            background-image:
                radial-gradient(1px 1px at 15% 20%, #fff, transparent),
                radial-gradient(1px 1px at 25% 45%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 60% 30%, #fff, transparent),
                radial-gradient(1px 1px at 80% 55%, #fff, transparent),
                radial-gradient(1px 1px at 45% 70%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 90% 80%, #fff, transparent),
                radial-gradient(1px 1px at 10% 90%, #fff, transparent),
                radial-gradient(1px 1px at 50% 95%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 75% 15%, #fff, transparent);
            background-repeat:repeat;
            opacity:0.75;
            pointer-events:none;
            z-index:0;
        }

        .container{
            width:93%;
            max-width:820px;
            margin:0 auto;
            padding:40px 12px;
            position:relative;
            z-index:1;
        }
        .hero{text-align:center;margin-bottom:45px}
        .title{
            font-size:clamp(2.2rem,6vw,3.6rem);
            color:#ffc8dd;
            text-shadow:0 0 6px rgba(255,200,221,.35);
            margin-bottom:8px;
        }
        .subtitle{
            color:#e6edf7;
            margin-bottom:20px;
            letter-spacing:1px;
        }
        .tags{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:8px;
        }
        .tags span{
            padding:5px 14px;
            background:rgba(255,255,255,.12);
            border-radius:25px;
            font-size:.9rem;
        }
        h2{
            font-size:1.35rem;
            color:#ffc8dd;
            border-left:3px solid #ffc8dd;
            padding-left:10px;
            margin-bottom:18px;
        }
        .card{
            background:rgba(0,20,40,.25);
            backdrop-filter:blur(6px);
            border:1px solid rgba(255,255,255,.1);
            border-radius:14px;
            padding:18px;
            margin-bottom:25px;
        }
        .skill-list{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:16px;
        }
        .skill-item h3{
            color:#e2e8f0;
            margin-bottom:8px;
            font-size:1.05rem;
        }
        .skill-item p{
            color:#cbd5e1;
            line-height:1.65;
            font-size:.95rem;
        }
        footer{
            text-align:center;
            margin-top:50px;
            color:#c5d4ec;
            font-size:.85rem;
        }
        .music-btn{
            position:fixed;
            bottom:20px;
            right:18px;
            width:46px;
            height:46px;
            border-radius:50%;
            background:rgba(255,200,221,.15);
            border:1px solid rgba(255,255,255,.18);
            color:#fff;
            font-size:20px;
            border:none;
            cursor:pointer;
            z-index: 1000;
        }

        /* 点击波纹特效 轻量不卡顿 */
        .click-wave {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #ffc8dd;
            border-radius: 50%;
            pointer-events: none;
            animation: clickRipple 0.6s ease-out forwards;
            z-index: 999;
        }
        @keyframes clickRipple {
            0% {transform: scale(1);opacity: 0.8;}
            100% {transform: scale(8);opacity: 0;}
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1 class="title">导师</h1>
            <p class="subtitle">小众 · 折腾 · 热爱 · 自由</p>
            <div class="tags">
                <span>蝴蝶刀</span>
                <span>长跑</span>
                <span>打游戏</span>
                <span>研究东西</span>
                <span>淘机</span>
            </div>
        </header>

        <section class="card">
            <h2>关于我</h2>
            <p>一名热爱折腾的高中生，喜欢探索新鲜事物，专注自己的爱好，稳步学习成长，保持热爱，好好生活。</p>
        </section>

        <h2>爱好 & 擅长</h2>
        <div class="skill-list">
            <div class="card skill-item">
                <h3>🎮 日常爱好</h3>
                <p>蝴蝶刀、长跑、打游戏、研究各类东西、二手淘机</p>
            </div>
            <div class="card skill-item">
                <h3>💻 技能擅长</h3>
                <p>Py代码编写、网页制作、使命召唤单机</p>
            </div>
            <div class="card skill-item">
                <h3>🗡️ 个人标签</h3>
                <p>蝴蝶刀入坑3个月萌新，慢慢练习，持续进步</p>
            </div>
        </div>

        <section class="card">
            <h2>交流</h2>
            <p>欢迎同好交流蝴蝶刀、长跑、游戏、编程、淘机、数码折腾等内容。</p>
        </section>

        <footer>
            <p>© 2026 导师 | daoshinb666.com 个人主页</p>
        </footer>
    </div>

    <button class="music-btn" id="musicBtn">♪</button>
    <audio id="bgm" preload="metadata">

    <script>
        // 点击波纹特效
        document.addEventListener('click',function(e){
            let ripple = document.createElement('div');
            ripple.className = 'click-wave';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            setTimeout(()=> ripple.remove(),600);
        })

        // 音乐功能
        const musicList = [
            {src:"https://music.163.com/song/media/outer/url?id=1906795321.mp3"},
            {src:"https://music.163.com/song/media/outer/url?id=29755535.mp3"},
            {src:"https://music.163.com/song/media/outer/url?id=1448054126.mp3"}
        ];
        const bgm = document.getElementById('bgm');
        const btn = document.getElementById('musicBtn');
        let idx = 0;
        bgm.src = musicList[0].src;
        bgm.volume = 0.65;
        btn.onclick = () => bgm.paused ? bgm.play() : bgm.pause();
        bgm.onended = ()=>{
            idx = (idx+1) % musicList.length;
            bgm.src = musicList[idx].src;
            bgm.play();
        };
    </script>
</body>
</html>
